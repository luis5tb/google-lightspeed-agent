# Google Cloud Build Configuration
# CI/CD pipeline for the Red Hat Lightspeed Agent for Google Cloud
#
# Images are built externally by Konflux and pushed to Quay.io.
# This pipeline pulls pre-built images from Quay, pushes them to GCR
# (Cloud Run cannot pull from Quay.io directly), and deploys both
# services to Cloud Run with optional per-service GCLB and Cloud Armor WAF:
#   1. marketplace-handler - Handles DCR and Pub/Sub events (always running)
#   2. lightspeed-agent    - A2A agent with MCP sidecar (always running)
#
# Prerequisites:
#   - Run deploy/cloudrun/setup.sh first to configure GCP services,
#     or use deploy/cloudrun/deploy-cloudbuild.sh for one-command deployment
#   - Update secrets in Secret Manager with actual values
#   - See deploy/cloudrun/README.md for full setup instructions
#
# Required permissions for Cloud Build service account:
#   - roles/run.admin (deploy Cloud Run services)
#   - roles/iam.serviceAccountUser (act as runtime service account)
#   - roles/pubsub.editor (create/update subscriptions)
#   - roles/compute.admin (create GCLB resources, Cloud Armor policies)
#
# Usage:
#   # Deploy with GCLB (default, requires domain names):
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_AGENT_DOMAIN_NAME=agent.example.com,_HANDLER_DOMAIN_NAME=dcr.example.com
#
#   # Deploy without GCLB:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_ENABLE_LB_AGENT=false,_ENABLE_LB_HANDLER=false

substitutions:
  _SERVICE_NAME: lightspeed-agent
  _HANDLER_SERVICE_NAME: marketplace-handler
  _REGION: us-central1
  _VERTEXAI_LOCATION: "global"
  _IMAGE_TAG: latest
  _SERVICE_ACCOUNT_NAME: lightspeed-agent
  _DB_INSTANCE_NAME: lightspeed-agent-db
  _VPC_CONNECTOR_NAME: lightspeed-redis-conn
  _MCP_SOURCE_IMAGE: "quay.io/redhat-services-prod/insights-management-tenant/insights-mcp/red-hat-lightspeed-mcp:latest"
  _ALLOW_UNAUTHENTICATED: "false"
  _PUBSUB_INVOKER_NAME: pubsub-invoker
  _PUBSUB_TOPIC: marketplace-entitlements
  _PUBSUB_SUBSCRIPTION: ""
  _AGENT_SOURCE_IMAGE: "quay.io/ecosystem-appeng/google-lightspeed-agent:latest"
  _HANDLER_SOURCE_IMAGE: "quay.io/ecosystem-appeng/google-marketplace-handler:latest"
  _SERVICE_CONTROL_SERVICE_NAME: ""
  # GCLB and Cloud Armor configuration
  _ENABLE_LB_AGENT: "true"
  _ENABLE_LB_HANDLER: "true"
  _ENABLE_CLOUD_ARMOR_AGENT: "true"
  _ENABLE_CLOUD_ARMOR_HANDLER: "true"
  _CLOUD_ARMOR_SENSITIVITY_AGENT: "1"
  _CLOUD_ARMOR_SENSITIVITY_HANDLER: "2"
  _AGENT_DOMAIN_NAME: ""
  _HANDLER_DOMAIN_NAME: ""
  _LB_NAME: lightspeed-lb

timeout: 1800s

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # ==========================================================================
  # VALIDATION - Fail fast on invalid configuration
  # ==========================================================================

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'validate-lb-config'
    entrypoint: 'bash'
    args:
      - '-euo'
      - 'pipefail'
      - '-c'
      - |
        if [ "${_ENABLE_LB_AGENT}" = "true" ] && [ -z "${_AGENT_DOMAIN_NAME}" ]; then
          echo "ERROR: _AGENT_DOMAIN_NAME is required when _ENABLE_LB_AGENT=true"
          echo "  Set via --substitutions=_AGENT_DOMAIN_NAME=agent.example.com"
          echo "  Or disable GCLB: --substitutions=_ENABLE_LB_AGENT=false,_ENABLE_LB_HANDLER=false"
          exit 1
        fi
        if [ "${_ENABLE_LB_HANDLER}" = "true" ] && [ -z "${_HANDLER_DOMAIN_NAME}" ]; then
          echo "ERROR: _HANDLER_DOMAIN_NAME is required when _ENABLE_LB_HANDLER=true"
          echo "  Set via --substitutions=_HANDLER_DOMAIN_NAME=dcr.example.com"
          echo "  Or disable GCLB: --substitutions=_ENABLE_LB_AGENT=false,_ENABLE_LB_HANDLER=false"
          exit 1
        fi
        if [ "${_ENABLE_CLOUD_ARMOR_AGENT}" = "true" ] && [ "${_ENABLE_LB_AGENT}" != "true" ]; then
          echo "ERROR: _ENABLE_CLOUD_ARMOR_AGENT requires _ENABLE_LB_AGENT=true"
          exit 1
        fi
        if [ "${_ENABLE_CLOUD_ARMOR_HANDLER}" = "true" ] && [ "${_ENABLE_LB_HANDLER}" != "true" ]; then
          echo "ERROR: _ENABLE_CLOUD_ARMOR_HANDLER requires _ENABLE_LB_HANDLER=true"
          exit 1
        fi
        # Cross-project Pub/Sub topic requires explicit subscription name
        if echo "${_PUBSUB_TOPIC}" | grep -q '^projects/' && [ -z "${_PUBSUB_SUBSCRIPTION}" ]; then
          echo "ERROR: _PUBSUB_SUBSCRIPTION is required when _PUBSUB_TOPIC is a fully-qualified path"
          echo "  Set via --substitutions=_PUBSUB_SUBSCRIPTION=marketplace-events-sub"
          exit 1
        fi
        echo "Configuration validated."
    waitFor: ['-']

  # ==========================================================================
  # COPY PHASE - Pull pre-built images from Quay.io and push to GCR (parallel)
  # ==========================================================================

  - name: 'gcr.io/cloud-builders/docker'
    id: 'copy-agent'
    entrypoint: 'bash'
    args:
      - '-euo'
      - 'pipefail'
      - '-c'
      - |
        docker pull ${_AGENT_SOURCE_IMAGE} && \
        docker tag ${_AGENT_SOURCE_IMAGE} gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${_IMAGE_TAG} && \
        docker push gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${_IMAGE_TAG}
    waitFor: ['-']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'copy-handler'
    entrypoint: 'bash'
    args:
      - '-euo'
      - 'pipefail'
      - '-c'
      - |
        docker pull ${_HANDLER_SOURCE_IMAGE} && \
        docker tag ${_HANDLER_SOURCE_IMAGE} gcr.io/${PROJECT_ID}/${_HANDLER_SERVICE_NAME}:${_IMAGE_TAG} && \
        docker push gcr.io/${PROJECT_ID}/${_HANDLER_SERVICE_NAME}:${_IMAGE_TAG}
    waitFor: ['-']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'copy-mcp'
    entrypoint: 'bash'
    args:
      - '-euo'
      - 'pipefail'
      - '-c'
      - |
        docker pull ${_MCP_SOURCE_IMAGE} && \
        docker tag ${_MCP_SOURCE_IMAGE} gcr.io/${PROJECT_ID}/red-hat-lightspeed-mcp:latest && \
        docker push gcr.io/${PROJECT_ID}/red-hat-lightspeed-mcp:latest
    waitFor: ['-']

  # ==========================================================================
  # DEPLOY PHASE - Deploy services to Cloud Run
  # Handler deploys first (must be running before agent goes live).
  # Uses the same YAML configs and sed substitution as deploy.sh.
  # ==========================================================================

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-handler'
    entrypoint: 'bash'
    args:
      - '-euo'
      - 'pipefail'
      - '-c'
      - |
        sed -e 's|gcr.io/$${PROJECT_ID}/marketplace-handler:latest|gcr.io/${PROJECT_ID}/${_HANDLER_SERVICE_NAME}:${_IMAGE_TAG}|g' \
            -e 's|$${PROJECT_ID}|${PROJECT_ID}|g' \
            -e 's|$${REGION}|${_REGION}|g' \
            -e 's|$${SERVICE_ACCOUNT_NAME}|${_SERVICE_ACCOUNT_NAME}|g' \
            -e 's|$${HANDLER_SERVICE_NAME}|${_HANDLER_SERVICE_NAME}|g' \
            -e 's|$${DB_INSTANCE_NAME}|${_DB_INSTANCE_NAME}|g' \
            -e 's|$${VPC_CONNECTOR_NAME}|${_VPC_CONNECTOR_NAME}|g' \
            -e 's|$${SERVICE_CONTROL_SERVICE_NAME}|${_SERVICE_CONTROL_SERVICE_NAME}|g' \
            deploy/cloudrun/marketplace-handler.yaml > /workspace/handler.yaml

        gcloud run services replace /workspace/handler.yaml \
            --region=${_REGION} \
            --project=${PROJECT_ID}
    waitFor: ['copy-handler']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-agent'
    entrypoint: 'bash'
    args:
      - '-euo'
      - 'pipefail'
      - '-c'
      - |
        sed -e 's|gcr.io/$${PROJECT_ID}/lightspeed-agent:latest|gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${_IMAGE_TAG}|g' \
            -e 's|$${MCP_IMAGE}|gcr.io/${PROJECT_ID}/red-hat-lightspeed-mcp:latest|g' \
            -e 's|$${PROJECT_ID}|${PROJECT_ID}|g' \
            -e 's|$${REGION}|${_REGION}|g' \
            -e 's|$${VERTEXAI_LOCATION}|${_VERTEXAI_LOCATION}|g' \
            -e 's|$${SERVICE_NAME}|${_SERVICE_NAME}|g' \
            -e 's|$${SERVICE_ACCOUNT_NAME}|${_SERVICE_ACCOUNT_NAME}|g' \
            -e 's|$${DB_INSTANCE_NAME}|${_DB_INSTANCE_NAME}|g' \
            -e 's|$${VPC_CONNECTOR_NAME}|${_VPC_CONNECTOR_NAME}|g' \
            deploy/cloudrun/service.yaml > /workspace/service.yaml

        gcloud run services replace /workspace/service.yaml \
            --region=${_REGION} \
            --project=${PROJECT_ID}
    waitFor: ['copy-agent', 'copy-mcp', 'deploy-handler']

  # ==========================================================================
  # GCLB PHASE - Set up per-service Google Cloud Load Balancers
  # Creates static IP, SSL cert, NEG, backend, Cloud Armor, URL map,
  # HTTPS proxy, and forwarding rule for each enabled service.
  # When LB is disabled for a service, overrides ingress to 'all'.
  # ==========================================================================

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'setup-lb-agent'
    entrypoint: 'bash'
    args:
      - '-euo'
      - 'pipefail'
      - '-c'
      - |
        if [ "${_ENABLE_LB_AGENT}" != "true" ]; then
          echo "GCLB disabled for agent, skipping."
          exit 0
        fi
        bash deploy/cloudrun/setup-lb.sh \
            agent "${_SERVICE_NAME}" "${_AGENT_DOMAIN_NAME}" \
            "${_ENABLE_CLOUD_ARMOR_AGENT}" "${_REGION}" "${PROJECT_ID}" "${_LB_NAME}" \
            "${_CLOUD_ARMOR_SENSITIVITY_AGENT}"
    waitFor: ['deploy-agent', 'validate-lb-config']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'setup-lb-handler'
    entrypoint: 'bash'
    args:
      - '-euo'
      - 'pipefail'
      - '-c'
      - |
        if [ "${_ENABLE_LB_HANDLER}" != "true" ]; then
          echo "GCLB disabled for handler, skipping."
          exit 0
        fi
        bash deploy/cloudrun/setup-lb.sh \
            handler "${_HANDLER_SERVICE_NAME}" "${_HANDLER_DOMAIN_NAME}" \
            "${_ENABLE_CLOUD_ARMOR_HANDLER}" "${_REGION}" "${PROJECT_ID}" "${_LB_NAME}" \
            "${_CLOUD_ARMOR_SENSITIVITY_HANDLER}"
    waitFor: ['deploy-handler', 'validate-lb-config']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'configure-ingress'
    entrypoint: 'bash'
    args:
      - '-euo'
      - 'pipefail'
      - '-c'
      - |
        if [ "${_ENABLE_LB_AGENT}" != "true" ]; then
          echo "No LB for agent — setting ingress to all..."
          gcloud run services update ${_SERVICE_NAME} \
              --region=${_REGION} --project=${PROJECT_ID} \
              --ingress=all --quiet
        fi
        if [ "${_ENABLE_LB_HANDLER}" != "true" ]; then
          echo "No LB for handler — setting ingress to all..."
          gcloud run services update ${_HANDLER_SERVICE_NAME} \
              --region=${_REGION} --project=${PROJECT_ID} \
              --ingress=all --quiet
        fi
        echo "Ingress configuration complete."
    waitFor: ['setup-lb-agent', 'setup-lb-handler']

  # ==========================================================================
  # POST-DEPLOY PHASE - Configure IAM, Pub/Sub, and service URLs
  # ==========================================================================

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'allow-unauthenticated'
    entrypoint: 'bash'
    args:
      - '-euo'
      - 'pipefail'
      - '-c'
      - |
        if [ "${_ALLOW_UNAUTHENTICATED}" != "true" ]; then
          echo "Skipping unauthenticated access (set _ALLOW_UNAUTHENTICATED=true to enable)"
          exit 0
        fi
        echo "Allowing unauthenticated access for both services..."
        gcloud run services add-iam-policy-binding ${_HANDLER_SERVICE_NAME} \
            --region=${_REGION} \
            --project=${PROJECT_ID} \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --quiet
        gcloud run services add-iam-policy-binding ${_SERVICE_NAME} \
            --region=${_REGION} \
            --project=${PROJECT_ID} \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --quiet
    waitFor: ['configure-ingress']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'configure-pubsub'
    entrypoint: 'bash'
    args:
      - '-euo'
      - 'pipefail'
      - '-c'
      - |
        # Pub/Sub push uses the Cloud Run URL directly — internal Google Cloud
        # traffic bypasses the GCLB, so this is correct even when LB is enabled.
        HANDLER_URL=$$(gcloud run services describe ${_HANDLER_SERVICE_NAME} \
            --region=${_REGION} \
            --project=${PROJECT_ID} \
            --format='value(status.url)')

        if [ -z "$$HANDLER_URL" ]; then
          echo "WARNING: Could not get handler URL, skipping Pub/Sub configuration"
          exit 0
        fi

        PUSH_ENDPOINT="$$HANDLER_URL/dcr"
        INVOKER_SA="${_PUBSUB_INVOKER_NAME}@${PROJECT_ID}.iam.gserviceaccount.com"
        SUBSCRIPTION="${_PUBSUB_SUBSCRIPTION:-${_PUBSUB_TOPIC}-sub}"

        gcloud run services add-iam-policy-binding ${_HANDLER_SERVICE_NAME} \
            --region=${_REGION} \
            --project=${PROJECT_ID} \
            --member="serviceAccount:$$INVOKER_SA" \
            --role="roles/run.invoker" \
            --quiet || true

        if gcloud pubsub subscriptions describe "$$SUBSCRIPTION" --project=${PROJECT_ID} &>/dev/null; then
          echo "Updating existing subscription '$$SUBSCRIPTION'..."
          gcloud pubsub subscriptions update "$$SUBSCRIPTION" \
              --push-endpoint="$$PUSH_ENDPOINT" \
              --push-auth-service-account="$$INVOKER_SA" \
              --ack-deadline=60 \
              --project=${PROJECT_ID} \
              --quiet
        else
          echo "Creating push subscription '$$SUBSCRIPTION'..."
          gcloud pubsub subscriptions create "$$SUBSCRIPTION" \
              --topic=${_PUBSUB_TOPIC} \
              --push-endpoint="$$PUSH_ENDPOINT" \
              --push-auth-service-account="$$INVOKER_SA" \
              --ack-deadline=60 \
              --project=${PROJECT_ID}
        fi

        echo "Pub/Sub push subscription configured:"
        echo "  Subscription: $$SUBSCRIPTION"
        echo "  Push endpoint: $$PUSH_ENDPOINT"
        echo "  Auth SA: $$INVOKER_SA"
    waitFor: ['deploy-handler']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'update-agent-urls'
    entrypoint: 'bash'
    args:
      - '-euo'
      - 'pipefail'
      - '-c'
      - |
        AGENT_URL=$$(gcloud run services describe ${_SERVICE_NAME} \
            --region=${_REGION} \
            --project=${PROJECT_ID} \
            --format='value(status.url)')
        HANDLER_URL=$$(gcloud run services describe ${_HANDLER_SERVICE_NAME} \
            --region=${_REGION} \
            --project=${PROJECT_ID} \
            --format='value(status.url)')

        # Use GCLB domain URLs when load balancers are enabled
        if [ "${_ENABLE_LB_AGENT}" = "true" ]; then
          AGENT_URL="https://${_AGENT_DOMAIN_NAME}"
        fi
        if [ "${_ENABLE_LB_HANDLER}" = "true" ]; then
          HANDLER_URL="https://${_HANDLER_DOMAIN_NAME}"
        fi

        if [ -z "$$AGENT_URL" ]; then
          echo "ERROR: Could not retrieve agent URL"
          exit 1
        fi

        ENV_VARS="AGENT_PROVIDER_URL=$$AGENT_URL"
        if [ -n "$$HANDLER_URL" ]; then
          ENV_VARS="$$ENV_VARS,MARKETPLACE_HANDLER_URL=$$HANDLER_URL"
        else
          echo "WARNING: Could not retrieve handler URL. MARKETPLACE_HANDLER_URL not set."
          echo "DCR endpoints in the AgentCard will fall back to AGENT_PROVIDER_URL."
        fi

        echo "Updating agent env vars with service URLs..."
        gcloud run services update ${_SERVICE_NAME} \
            --region=${_REGION} \
            --project=${PROJECT_ID} \
            --update-env-vars="$$ENV_VARS" \
            --quiet

        echo "Agent URLs configured:"
        echo "  AGENT_PROVIDER_URL: $$AGENT_URL"
        echo "  MARKETPLACE_HANDLER_URL: $$HANDLER_URL"
    waitFor: ['configure-ingress']

images:
  - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${_IMAGE_TAG}'
  - 'gcr.io/${PROJECT_ID}/${_HANDLER_SERVICE_NAME}:${_IMAGE_TAG}'
  - 'gcr.io/${PROJECT_ID}/red-hat-lightspeed-mcp:latest'

tags:
  - 'lightspeed-agent'
  - 'cloud-run'
