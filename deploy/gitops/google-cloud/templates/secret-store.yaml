{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ include "chart.fullname" . }}-gcp-sm
  namespace: {{ include "chart.namespace" . }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  provider:
    gcpsm:
      projectID: {{ required "project.id is required" .Values.project.id | quote }}
      auth:
        secretRef:
          secretAccessKeySecretRef:
            name: {{ .Values.externalSecrets.auth.secretName }}
            key: {{ .Values.externalSecrets.auth.secretKey }}
{{- end }}
