# Cloud Run Service Configuration for Marketplace Handler
#
# This is a SEPARATE service from the Agent that handles:
# 1. Pub/Sub events from Google Cloud Marketplace (async provisioning)
# 2. DCR requests from Gemini Enterprise (sync client registration)
#
# This service must be ALWAYS RUNNING to receive procurement events,
# even before any agent instances are deployed.
#
# Deployment Flow:
# 1. Customer purchases from Google Marketplace
# 2. Pub/Sub event → This service (approves account/entitlement)
# 3. User configures agent in Gemini Enterprise
# 4. Gemini sends DCR request → This service (creates OAuth client)
# 5. User interacts with agent → Agent Service (uses OAuth tokens)
#
# Usage:
#   gcloud run services replace deploy/cloudrun/marketplace-handler.yaml \
#     --region=us-central1 --project=YOUR_PROJECT_ID

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ${HANDLER_SERVICE_NAME}
  labels:
    app: ${HANDLER_SERVICE_NAME}
    component: provisioning
  annotations:
    run.googleapis.com/description: "Marketplace provisioning and DCR handler for Lightspeed Agent"
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        # Scaling: Keep at least 1 instance to receive Pub/Sub events quickly
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "1"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
        # Cloud SQL connection
        run.googleapis.com/cloudsql-instances: "${PROJECT_ID}:${REGION}:${DB_INSTANCE_NAME}"
        # VPC connector for Cloud Memorystore Redis (rate limiting)
        run.googleapis.com/vpc-access-connector: projects/${PROJECT_ID}/locations/${REGION}/connectors/${VPC_CONNECTOR_NAME}
        run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      containerConcurrency: 80
      timeoutSeconds: 60
      serviceAccountName: ${SERVICE_ACCOUNT_NAME}@${PROJECT_ID}.iam.gserviceaccount.com
      containers:
        - name: ${HANDLER_SERVICE_NAME}
          image: gcr.io/${PROJECT_ID}/marketplace-handler:latest
          ports:
            - name: http1
              containerPort: 8001
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            # Handler Configuration
            - name: HANDLER_HOST
              value: "0.0.0.0"
            - name: HANDLER_PORT
              value: "8001"
            - name: LOG_LEVEL
              value: "INFO"
            - name: LOG_FORMAT
              value: "json"
            # Google Cloud Configuration
            - name: GOOGLE_CLOUD_PROJECT
              value: "${PROJECT_ID}"
            # Marketplace product identifier (managed service name from
            # Producer Portal). Required for entitlement approval via the
            # Procurement API and for product-level event filtering.
            - name: SERVICE_CONTROL_SERVICE_NAME
              value: "${SERVICE_CONTROL_SERVICE_NAME}"
            # Red Hat SSO Configuration
            - name: RED_HAT_SSO_ISSUER
              value: "https://sso.redhat.com/auth/realms/redhat-external"
            # Agent provider's organization website URL.
            # Used as the expected JWT audience for Google DCR
            # software_statement validation. Must match the aud claim
            # Google sends in the software_statement.
            - name: AGENT_PROVIDER_ORGANIZATION_URL
              value: "https://www.redhat.com"
            # Ensure production environment do not skip JWT validation
            - name: SKIP_JWT_VALIDATION
              value: "false"
            # DCR Configuration
            - name: DCR_CLIENT_NAME_PREFIX
              value: "gemini-order-"
            # GMA SSO API base URL for tenant creation.
            # Production: https://sso.redhat.com/auth/realms/redhat-external/apis/beta/acs/v1/
            # Staging:    https://sso.stage.redhat.com/auth/realms/redhat-external/apis/beta/acs/v1/
            - name: GMA_API_BASE_URL
              value: "https://sso.redhat.com/auth/realms/redhat-external/apis/beta/acs/v1/"
            # Secrets from Secret Manager
            - name: RED_HAT_SSO_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: redhat-sso-client-id
                  key: latest
            - name: RED_HAT_SSO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: redhat-sso-client-secret
                  key: latest
            - name: GMA_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: gma-client-id
                  key: latest
            - name: GMA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gma-client-secret
                  key: latest
            - name: DCR_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: dcr-encryption-key
                  key: latest
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-url
                  key: latest
            # Rate Limiting (Redis-backed, shared with Agent service)
            # Uses rediss:// (TLS) for in-transit encryption to Cloud Memorystore
            - name: RATE_LIMIT_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: rate-limit-redis-url
                  key: latest
            # Path to the Cloud Memorystore server CA certificate for TLS verification
            - name: RATE_LIMIT_REDIS_CA_CERT
              value: "/secrets/redis-ca-cert/latest"
            - name: RATE_LIMIT_REDIS_TIMEOUT_MS
              value: "200"
            - name: RATE_LIMIT_KEY_PREFIX
              value: "lightspeed:ratelimit"
            - name: RATE_LIMIT_REQUESTS_PER_MINUTE
              value: "60"
            - name: RATE_LIMIT_REQUESTS_PER_HOUR
              value: "1000"
            # Probe server port (health/readiness checks on separate port)
            - name: HANDLER_PROBE_PORT
              value: "8003"
          volumeMounts:
            - name: redis-ca-cert
              mountPath: /secrets/redis-ca-cert
              readOnly: true
          # Health checks (served by the probe server on a separate port)
          startupProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: redis-ca-cert
          secret:
            secretName: redis-ca-cert
            items:
              - key: latest
                path: latest
  traffic:
    - percent: 100
      latestRevision: true
