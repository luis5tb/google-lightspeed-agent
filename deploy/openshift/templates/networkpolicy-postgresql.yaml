apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lightspeed-agent.postgresqlServiceName" . }}
  labels:
    {{- include "lightspeed-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  podSelector:
    matchLabels:
      {{- include "lightspeed-agent.postgresqlSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "lightspeed-agent.agentSelectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
