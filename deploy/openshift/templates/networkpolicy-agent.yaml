apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lightspeed-agent.fullname" . }}
  labels:
    {{- include "lightspeed-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  podSelector:
    matchLabels:
      {{- include "lightspeed-agent.agentSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
              kubernetes.io/metadata.name: {{ .Values.agent.ingressNamespace | default "openshift-ingress" }}
        {{- if eq (include "lightspeed-agent.uiEnabled" .) "true" }}
        - podSelector:
            matchLabels:
              {{- include "lightspeed-agent.uiSelectorLabels" . | nindent 14 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.agent.port }}
    {{- if and .Values.otel.metricsEnabled .Values.monitoring.serviceMonitor.enabled }}
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: monitoring
      ports:
        - protocol: TCP
          port: {{ .Values.otel.metricsPrometheusPort }}
    {{- end }}
