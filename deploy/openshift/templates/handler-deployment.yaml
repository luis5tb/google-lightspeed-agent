{{- if eq (include "lightspeed-agent.handlerEnabled" .) "true" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lightspeed-agent.handlerServiceName" . }}
  labels:
    {{- include "lightspeed-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: handler
spec:
  replicas: {{ .Values.handler.replicas }}
  selector:
    matchLabels:
      {{- include "lightspeed-agent.handlerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lightspeed-agent.handlerSelectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
      containers:
        - name: marketplace-handler
          image: {{ printf "%s:%s" .Values.handler.image.repository .Values.handler.image.tag }}
          imagePullPolicy: {{ .Values.handler.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: {{ .Values.handler.port }}
              protocol: TCP
              name: http
            - containerPort: {{ .Values.handler.probePort }}
              protocol: TCP
              name: probe
          envFrom:
            - configMapRef:
                name: {{ include "lightspeed-agent.fullname" . }}-config
          env:
            - name: GOOGLE_CLOUD_PROJECT
              valueFrom:
                secretKeyRef:
                  name: {{ include "lightspeed-agent.fullname" . }}-secrets
                  key: GOOGLE_CLOUD_PROJECT
                  optional: true
            - name: RED_HAT_SSO_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "lightspeed-agent.fullname" . }}-secrets
                  key: RED_HAT_SSO_CLIENT_ID
            - name: RED_HAT_SSO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "lightspeed-agent.fullname" . }}-secrets
                  key: RED_HAT_SSO_CLIENT_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "lightspeed-agent.fullname" . }}-secrets
                  key: DATABASE_URL
            - name: DCR_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lightspeed-agent.fullname" . }}-secrets
                  key: DCR_ENCRYPTION_KEY
            - name: GMA_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "lightspeed-agent.fullname" . }}-secrets
                  key: GMA_CLIENT_ID
            - name: GMA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "lightspeed-agent.fullname" . }}-secrets
                  key: GMA_CLIENT_SECRET
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "lightspeed-agent.fullname" . }}-secrets
                  key: REDIS_PASSWORD
            - name: RATE_LIMIT_REDIS_URL
              value: {{ printf "redis://default:$(REDIS_PASSWORD)@%s-redis:6379/0" (include "lightspeed-agent.fullname" .) | quote }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.handler.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.handler.probePort }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.handler.probePort }}
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.handler.probePort }}
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
