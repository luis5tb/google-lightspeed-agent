{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lightspeed-agent.fullname" . }}-secrets
  labels:
    {{- include "lightspeed-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  GOOGLE_API_KEY: {{ .Values.secrets.googleApiKey | quote }}
  GOOGLE_CLOUD_PROJECT: {{ .Values.secrets.googleCloudProject | quote }}
  RED_HAT_SSO_CLIENT_ID: {{ .Values.secrets.redHatSsoClientId | quote }}
  RED_HAT_SSO_CLIENT_SECRET: {{ .Values.secrets.redHatSsoClientSecret | quote }}
  SESSION_DB_PASSWORD: {{ .Values.secrets.sessionDbPassword | quote }}
  {{- if .Values.secrets.sessionDatabaseUrl }}
  SESSION_DATABASE_URL: {{ .Values.secrets.sessionDatabaseUrl | quote }}
  {{- else }}
  SESSION_DATABASE_URL: {{ printf "postgresql+asyncpg://%s:%s@%s:5432/%s" .Values.postgresql.user .Values.secrets.sessionDbPassword (include "lightspeed-agent.postgresqlServiceName" .) .Values.postgresql.database | quote }}
  {{- end }}
  MARKETPLACE_DB_PASSWORD: {{ .Values.secrets.marketplaceDbPassword | quote }}
  {{- if .Values.secrets.databaseUrl }}
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  {{- else }}
  DATABASE_URL: {{ printf "postgresql+asyncpg://%s:%s@%s:5432/%s" .Values.marketplacePostgresql.user .Values.secrets.marketplaceDbPassword (include "lightspeed-agent.marketplacePostgresqlServiceName" .) .Values.marketplacePostgresql.database | quote }}
  {{- end }}
  DCR_ENCRYPTION_KEY: {{ .Values.secrets.dcrEncryptionKey | quote }}
  GMA_CLIENT_ID: {{ .Values.secrets.gmaClientId | quote }}
  GMA_CLIENT_SECRET: {{ .Values.secrets.gmaClientSecret | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | quote }}
  LLM_API_KEY: {{ .Values.secrets.llmApiKey | quote }}
  REDIS_CONF: |
    requirepass {{ .Values.secrets.redisPassword }}
{{- end }}
