apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lightspeed-agent.redisServiceName" . }}
  labels:
    {{- include "lightspeed-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: ratelimit
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "lightspeed-agent.redisSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lightspeed-agent.redisSelectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
      containers:
        - name: redis
          image: {{ printf "%s:%s" .Values.redis.image.repository .Values.redis.image.tag }}
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "lightspeed-agent.fullname" . }}-secrets
                  key: REDIS_PASSWORD
          args:
            - "redis-server"
            - "/etc/redis/redis.conf"
            - "--appendonly"
            - "yes"
            - "--dir"
            - "/data"
          ports:
            - containerPort: 6379
              protocol: TCP
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: redis-config
              mountPath: /etc/redis
              readOnly: true
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping 2>/dev/null | grep -q PONG
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping 2>/dev/null | grep -q PONG
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: {{ include "lightspeed-agent.fullname" . }}-redis-data
        - name: redis-config
          secret:
            secretName: {{ include "lightspeed-agent.fullname" . }}-secrets
            items:
              - key: REDIS_CONF
                path: redis.conf
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lightspeed-agent.redisServiceName" . }}
  labels:
    {{- include "lightspeed-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: ratelimit
spec:
  selector:
    {{- include "lightspeed-agent.redisSelectorLabels" . | nindent 4 }}
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
  type: ClusterIP
