apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lightspeed-agent.fullname" . }}
  labels:
    {{- include "lightspeed-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  replicas: {{ .Values.agent.replicas }}
  selector:
    matchLabels:
      {{- include "lightspeed-agent.agentSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lightspeed-agent.agentSelectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        checksum/gcp-sa: {{ include (print $.Template.BasePath "/gcp-sa-secret.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
      containers:
        # ===================================================================
        # Lightspeed Agent
        # ===================================================================
        - name: lightspeed-agent
          image: {{ printf "%s:%s" .Values.agent.image.repository .Values.agent.image.tag }}
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: {{ .Values.agent.port }}
              protocol: TCP
              name: http
            - containerPort: {{ .Values.agent.probePort }}
              protocol: TCP
              name: probe
            {{- if .Values.otel.metricsEnabled }}
            - containerPort: {{ .Values.otel.metricsPrometheusPort }}
              protocol: TCP
              name: metrics
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "lightspeed-agent.fullname" . }}-config
          env:
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lightspeed-agent.fullname" . }}-secrets
                  key: GOOGLE_API_KEY
            - name: GOOGLE_CLOUD_PROJECT
              valueFrom:
                secretKeyRef:
                  name: {{ include "lightspeed-agent.fullname" . }}-secrets
                  key: GOOGLE_CLOUD_PROJECT
                  optional: true
            {{- if .Values.secrets.gcpServiceAccountKey }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/run/secrets/gcp/sa-key.json
            {{- end }}
            - name: RED_HAT_SSO_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "lightspeed-agent.fullname" . }}-secrets
                  key: RED_HAT_SSO_CLIENT_ID
            - name: RED_HAT_SSO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "lightspeed-agent.fullname" . }}-secrets
                  key: RED_HAT_SSO_CLIENT_SECRET
            - name: SESSION_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "lightspeed-agent.fullname" . }}-secrets
                  key: SESSION_DATABASE_URL
                  optional: true
            {{- /* DATABASE_URL needed in standalone mode (local PostgreSQL) or when order validation is on */ -}}
            {{- if or (eq .Values.deploymentMode "standalone") (not .Values.auth.skipOrderValidation) }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "lightspeed-agent.fullname" . }}-secrets
                  key: DATABASE_URL
            {{- end }}
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lightspeed-agent.fullname" . }}-secrets
                  key: LLM_API_KEY
                  optional: true
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "lightspeed-agent.fullname" . }}-secrets
                  key: REDIS_PASSWORD
            - name: RATE_LIMIT_REDIS_URL
              value: {{ printf "redis://default:$(REDIS_PASSWORD)@%s-redis:6379/0" (include "lightspeed-agent.fullname" .) | quote }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if and .Values.agent.skillsDir .Values.agent.skillsConfigMap }}
            - name: external-skills
              mountPath: {{ .Values.agent.skillsDir }}
              readOnly: true
            {{- end }}
            {{- if .Values.secrets.gcpServiceAccountKey }}
            - name: gcp-sa-key
              mountPath: /var/run/secrets/gcp
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.agent.probePort }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.agent.probePort }}
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.agent.probePort }}
            periodSeconds: 30
            failureThreshold: 3

        # ===================================================================
        # Red Hat Lightspeed MCP Server (Sidecar)
        # ===================================================================
        - name: lightspeed-mcp
          image: {{ printf "%s:%s" .Values.mcp.image.repository .Values.mcp.image.tag }}
          imagePullPolicy: {{ .Values.mcp.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: mcp-tmp
              mountPath: /tmp
          envFrom:
            - configMapRef:
                name: {{ include "lightspeed-agent.fullname" . }}-config
          args:
            {{- if .Values.mcp.readOnly }}
            - "--readonly"
            {{- end }}
            {{- if .Values.mcp.toolset }}
            - "--toolset"
            - {{ .Values.mcp.toolset | quote }}
            {{- end }}
            - "--debug"
            - "$(MCP_SERVER_MODE)"
            - "--port"
            - "$(MCP_SERVER_PORT)"
            - "--host"
            - "$(MCP_SERVER_HOST)"
          ports:
            - containerPort: {{ .Values.mcp.port }}
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: {{ .Values.mcp.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: {{ .Values.mcp.port }}
            periodSeconds: 30
            failureThreshold: 3
          resources:
            {{- toYaml .Values.mcp.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: mcp-tmp
          emptyDir: {}
        {{- if and .Values.agent.skillsDir .Values.agent.skillsConfigMap }}
        - name: external-skills
          configMap:
            name: {{ .Values.agent.skillsConfigMap }}
        {{- end }}
        {{- if .Values.secrets.gcpServiceAccountKey }}
        - name: gcp-sa-key
          secret:
            secretName: {{ include "lightspeed-agent.fullname" . }}-gcp-sa-key
        {{- end }}
