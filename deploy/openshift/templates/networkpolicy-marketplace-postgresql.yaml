{{- if eq (include "lightspeed-agent.handlerEnabled" .) "true" }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lightspeed-agent.marketplacePostgresqlServiceName" . }}
  labels:
    {{- include "lightspeed-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: marketplace-database
spec:
  podSelector:
    matchLabels:
      {{- include "lightspeed-agent.marketplacePostgresqlSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "lightspeed-agent.agentSelectorLabels" . | nindent 14 }}
        - podSelector:
            matchLabels:
              {{- include "lightspeed-agent.handlerSelectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
{{- end }}
