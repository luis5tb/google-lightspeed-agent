apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lightspeed-agent.redisServiceName" . }}
  labels:
    {{- include "lightspeed-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: ratelimit
spec:
  podSelector:
    matchLabels:
      {{- include "lightspeed-agent.redisSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "lightspeed-agent.agentSelectorLabels" . | nindent 14 }}
        {{- if eq (include "lightspeed-agent.handlerEnabled" .) "true" }}
        - podSelector:
            matchLabels:
              {{- include "lightspeed-agent.handlerSelectorLabels" . | nindent 14 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 6379
