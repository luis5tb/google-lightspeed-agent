{{- if .Values.openshell.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lightspeed-agent.fullname" . }}-openshell
  labels:
    {{- include "lightspeed-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  podSelector:
    matchLabels:
      {{- include "lightspeed-agent.agentSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.openshell.gatewayNamespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.agent.port }}
{{- end }}
