{{- if eq (include "lightspeed-agent.uiEnabled" .) "true" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lightspeed-agent.uiServiceName" . }}
  labels:
    {{- include "lightspeed-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  selector:
    {{- include "lightspeed-agent.uiSelectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.standaloneUI.port }}
      targetPort: {{ .Values.standaloneUI.port }}
      protocol: TCP
      name: http
  type: ClusterIP
{{- end }}
