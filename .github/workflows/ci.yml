name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  konflux-verify:
    name: Verify Konflux PR
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login == 'red-hat-konflux[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import Konflux GPG public key
        run: |
          gpg --keyserver keyserver.ubuntu.com --recv-keys B5690EEEBB952194 ||
            gpg --keyserver keys.openpgp.org --recv-keys B5690EEEBB952194

      - name: Verify commit signatures and sign-off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          EXPECTED_SOB="Signed-off-by: red-hat-konflux <126015336+red-hat-konflux[bot]@users.noreply.github.com>"
          COMMITS=$(git rev-list "$BASE_SHA".."$HEAD_SHA")

          if [ -z "$COMMITS" ]; then
            echo "::error::No commits found in PR range $BASE_SHA..$HEAD_SHA"
            exit 1
          fi

          for COMMIT in $COMMITS; do
            echo "::group::Verifying commit $COMMIT"

            # Verify GPG signature exists and is valid
            if ! VERIFY_OUTPUT=$(git verify-commit "$COMMIT" 2>&1); then
              echo "::error::Commit $COMMIT has no valid GPG signature"
              echo "$VERIFY_OUTPUT"
              exit 1
            fi

            # Verify the signing key matches the expected Konflux key
            if ! echo "$VERIFY_OUTPUT" | grep -q "B5690EEEBB952194"; then
              echo "::error::Commit $COMMIT not signed with expected Konflux key (B5690EEEBB952194)"
              echo "$VERIFY_OUTPUT"
              exit 1
            fi

            # Verify Signed-off-by trailer
            COMMIT_MSG=$(git log -1 --format=%B "$COMMIT")
            if ! echo "$COMMIT_MSG" | grep -qF "$EXPECTED_SOB"; then
              echo "::error::Commit $COMMIT missing required Signed-off-by trailer"
              echo "Expected: $EXPECTED_SOB"
              echo "Found:    $(echo "$COMMIT_MSG" | grep 'Signed-off-by' || echo '(none)')"
              exit 1
            fi

            echo "Commit $COMMIT: VERIFIED"
            echo "::endgroup::"
          done

          echo "All $(echo "$COMMITS" | wc -w) commit(s) verified successfully."

  lock-file-check:
    name: Lock file verification
    if: false  # temporarily disabled
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream9
    steps:
      - uses: actions/checkout@v4

      - name: Install Python and uv
        run: |
          dnf install -y python3.12 python3.12-pip python3.12-devel diffutils
          python3.12 -m pip install uv

      - name: Verify agent lock file
        run: |
          python3.12 -m uv pip compile --generate-hashes --python-version=3.12 --python-platform=linux \
            --extra agent --output-file=/tmp/requirements-agent-check.txt pyproject.toml
          diff <(tail -n +3 requirements-agent.txt) <(tail -n +3 /tmp/requirements-agent-check.txt) || \
            (echo "ERROR: requirements-agent.txt is out of sync. Run 'make lock' to update." && exit 1)

      - name: Verify handler lock file
        run: |
          python3.12 -m uv pip compile --generate-hashes --python-version=3.12 --python-platform=linux \
            --output-file=/tmp/requirements-handler-check.txt pyproject.toml
          diff <(tail -n +3 requirements-handler.txt) <(tail -n +3 /tmp/requirements-handler-check.txt) || \
            (echo "ERROR: requirements-handler.txt is out of sync. Run 'make lock' to update." && exit 1)

      - name: Verify dev lock file
        run: |
          python3.12 -m uv pip compile --generate-hashes --python-version=3.12 --python-platform=linux \
            --extra dev --output-file=/tmp/requirements-dev-check.txt pyproject.toml
          diff <(tail -n +3 requirements-dev.txt) <(tail -n +3 /tmp/requirements-dev-check.txt) || \
            (echo "ERROR: requirements-dev.txt is out of sync. Run 'make lock' to update." && exit 1)

  lint:
    name: Lint
    needs: [konflux-verify, lock-file-check]
    if: >-
      !cancelled() &&
      (needs.konflux-verify.result == 'success' || needs.konflux-verify.result == 'skipped') &&
      (needs.lock-file-check.result == 'success' || needs.lock-file-check.result == 'skipped')
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream9
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        run: dnf install -y python3.12 python3.12-pip python3.12-devel

      - name: Install dependencies
        run: |
          python3.12 -m pip install --require-hashes -r requirements-agent.txt
          python3.12 -m pip install --require-hashes -r requirements-dev.txt
          python3.12 -m pip install --no-deps -e .

      - name: Run ruff
        run: python3.12 -m ruff check src/ tests/

      - name: Run mypy
        run: python3.12 -m mypy src/lightspeed_agent/ --ignore-missing-imports

  test:
    name: Test
    needs: [konflux-verify, lock-file-check]
    if: >-
      !cancelled() &&
      (needs.konflux-verify.result == 'success' || needs.konflux-verify.result == 'skipped') &&
      (needs.lock-file-check.result == 'success' || needs.lock-file-check.result == 'skipped')
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream9
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        run: dnf install -y python3.12 python3.12-pip python3.12-devel

      - name: Install dependencies
        run: |
          python3.12 -m pip install --require-hashes -r requirements-agent.txt
          python3.12 -m pip install --require-hashes -r requirements-dev.txt
          python3.12 -m pip install --no-deps -e .

      - name: Run tests
        run: python3.12 -m pytest tests/ -v

  test-shell:
    name: Shell tests
    needs: [konflux-verify, lock-file-check]
    if: >-
      !cancelled() &&
      (needs.konflux-verify.result == 'success' || needs.konflux-verify.result == 'skipped') &&
      (needs.lock-file-check.result == 'success' || needs.lock-file-check.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run shell tests
        run: bats tests/shell/

  build:
    name: Build container image
    needs: [konflux-verify, lock-file-check]
    if: >-
      !cancelled() &&
      (needs.konflux-verify.result == 'success' || needs.konflux-verify.result == 'skipped') &&
      (needs.lock-file-check.result == 'success' || needs.lock-file-check.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: podman build -t lightspeed-agent:ci -f Containerfile .

  ci-gate:
    name: CI Gate
    if: always()
    needs: [konflux-verify, lock-file-check, lint, test, test-shell, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          # konflux-verify is skipped for non-Konflux PRs and pushes — that's expected
          if [[ "${{ needs.konflux-verify.result }}" != "success" && "${{ needs.konflux-verify.result }}" != "skipped" ]]; then
            echo "Konflux verification failed: ${{ needs.konflux-verify.result }}"
            exit 1
          fi
          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.test-shell.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" || \
                ("${{ needs.lock-file-check.result }}" != "success" && "${{ needs.lock-file-check.result }}" != "skipped") ]]; then
            echo "One or more CI jobs failed or were cancelled."
            echo "  konflux-verify:  ${{ needs.konflux-verify.result }}"
            echo "  lock-file-check: ${{ needs.lock-file-check.result }}"
            echo "  lint:            ${{ needs.lint.result }}"
            echo "  test:            ${{ needs.test.result }}"
            echo "  test-shell:      ${{ needs.test-shell.result }}"
            echo "  build:           ${{ needs.build.result }}"
            exit 1
          fi
          echo "All CI jobs passed."
