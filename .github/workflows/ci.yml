name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  konflux-verify:
    name: Verify Konflux PR
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login == 'red-hat-konflux[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import Konflux GPG public key
        run: |
          gpg --keyserver keyserver.ubuntu.com --recv-keys B5690EEEBB952194 ||
            gpg --keyserver keys.openpgp.org --recv-keys B5690EEEBB952194

      - name: Verify commit signatures and sign-off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          EXPECTED_SOB="Signed-off-by: red-hat-konflux <126015336+red-hat-konflux[bot]@users.noreply.github.com>"
          COMMITS=$(git rev-list "$BASE_SHA".."$HEAD_SHA")

          if [ -z "$COMMITS" ]; then
            echo "::error::No commits found in PR range $BASE_SHA..$HEAD_SHA"
            exit 1
          fi

          for COMMIT in $COMMITS; do
            echo "::group::Verifying commit $COMMIT"

            # Verify GPG signature exists and is valid
            if ! VERIFY_OUTPUT=$(git verify-commit "$COMMIT" 2>&1); then
              echo "::error::Commit $COMMIT has no valid GPG signature"
              echo "$VERIFY_OUTPUT"
              exit 1
            fi

            # Verify the signing key matches the expected Konflux key
            if ! echo "$VERIFY_OUTPUT" | grep -q "B5690EEEBB952194"; then
              echo "::error::Commit $COMMIT not signed with expected Konflux key (B5690EEEBB952194)"
              echo "$VERIFY_OUTPUT"
              exit 1
            fi

            # Verify Signed-off-by trailer
            COMMIT_MSG=$(git log -1 --format=%B "$COMMIT")
            if ! echo "$COMMIT_MSG" | grep -qF "$EXPECTED_SOB"; then
              echo "::error::Commit $COMMIT missing required Signed-off-by trailer"
              echo "Expected: $EXPECTED_SOB"
              echo "Found:    $(echo "$COMMIT_MSG" | grep 'Signed-off-by' || echo '(none)')"
              exit 1
            fi

            echo "Commit $COMMIT: VERIFIED"
            echo "::endgroup::"
          done

          echo "All $(echo "$COMMITS" | wc -w) commit(s) verified successfully."

  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      pyproject: ${{ steps.filter.outputs.pyproject }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'requirements-*.txt'
              - 'Makefile'
              - 'Containerfile'
              - 'Containerfile.marketplace-handler'
              - 'agent.py'
            pyproject:
              - 'pyproject.toml'

  lock-file-check:
    name: Lock file verification
    needs: [detect-changes]
    if: needs.detect-changes.outputs.pyproject == 'true'
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream9
    steps:
      - uses: actions/checkout@v4

      - name: Install Python and uv
        run: |
          dnf install -y python3.12 python3.12-pip python3.12-devel diffutils make
          python3.12 -m pip install uv

      - name: Verify lock files
        run: make lock-check

  vulnerability-scan:
    name: Vulnerability scan (pip-audit)
    needs: [lock-file-check, detect-changes]
    if: >-
      !cancelled() &&
      needs.detect-changes.outputs.python == 'true' &&
      (needs.lock-file-check.result == 'success' || needs.lock-file-check.result == 'skipped')
    runs-on: ubuntu-latest
    continue-on-error: true
    container:
      image: quay.io/centos/centos:stream9
    steps:
      - uses: actions/checkout@v4

      - name: Install Python and pip-audit
        run: |
          dnf install -y python3.12 python3.12-pip make
          python3.12 -m pip install pip-audit

      - name: Scan dependencies
        run: make audit

  lint:
    name: Lint
    needs: [konflux-verify, lock-file-check, detect-changes]
    if: >-
      !cancelled() &&
      needs.detect-changes.outputs.python == 'true' &&
      (needs.konflux-verify.result == 'success' || needs.konflux-verify.result == 'skipped') &&
      (needs.lock-file-check.result == 'success' || needs.lock-file-check.result == 'skipped')
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream9
    steps:
      - uses: actions/checkout@v4

      - name: Install Python and uv
        run: |
          dnf install -y python3.12 python3.12-pip python3.12-devel
          python3.12 -m pip install uv

      - name: Install dependencies
        run: |
          uv pip install --system --require-hashes -r requirements-agent.txt --python python3.12
          uv pip install --system --require-hashes -r requirements-dev.txt --python python3.12
          uv pip install --system --no-deps -e . --python python3.12

      - name: Run ruff
        run: python3.12 -m ruff check src/ tests/

      - name: Run mypy
        run: python3.12 -m mypy src/lightspeed_agent/ --ignore-missing-imports

  test:
    name: Test
    needs: [konflux-verify, lock-file-check, detect-changes]
    if: >-
      !cancelled() &&
      needs.detect-changes.outputs.python == 'true' &&
      (needs.konflux-verify.result == 'success' || needs.konflux-verify.result == 'skipped') &&
      (needs.lock-file-check.result == 'success' || needs.lock-file-check.result == 'skipped')
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream9
    steps:
      - uses: actions/checkout@v4

      - name: Install Python and uv
        run: |
          dnf install -y python3.12 python3.12-pip python3.12-devel
          python3.12 -m pip install uv

      - name: Install dependencies
        run: |
          uv pip install --system --require-hashes -r requirements-agent.txt --python python3.12
          uv pip install --system --require-hashes -r requirements-dev.txt --python python3.12
          uv pip install --system --no-deps -e . --python python3.12

      - name: Run tests
        run: python3.12 -m pytest tests/ -v

  build:
    name: Build container image
    needs: [konflux-verify, lock-file-check, detect-changes]
    if: >-
      !cancelled() &&
      needs.detect-changes.outputs.python == 'true' &&
      (needs.konflux-verify.result == 'success' || needs.konflux-verify.result == 'skipped') &&
      (needs.lock-file-check.result == 'success' || needs.lock-file-check.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: podman build -t lightspeed-agent:ci -f Containerfile .

      - name: Save image as artifact
        run: podman save lightspeed-agent:ci -o /tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: container-image
          path: /tmp/image.tar
          retention-days: 1

  container-scan:
    name: Container image scan (Trivy)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: container-image
          path: /tmp

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: '/tmp/image.tar'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  ci-gate:
    name: CI Gate
    if: always()
    needs: [konflux-verify, lock-file-check, lint, test, build, container-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          # konflux-verify is skipped for non-Konflux PRs and pushes — that's expected
          if [[ "${{ needs.konflux-verify.result }}" != "success" && "${{ needs.konflux-verify.result }}" != "skipped" ]]; then
            echo "Konflux verification failed: ${{ needs.konflux-verify.result }}"
            exit 1
          fi
          # lock-file-check is skipped when pyproject.toml was not changed — that's expected
          if [[ "${{ needs.lock-file-check.result }}" != "success" && "${{ needs.lock-file-check.result }}" != "skipped" ]]; then
            echo "Lock file check failed: ${{ needs.lock-file-check.result }}"
            exit 1
          fi
          # lint, test, build, container-scan are skipped when no Python/dependency files changed — that's expected
          for job_result in "${{ needs.lint.result }}" "${{ needs.test.result }}" "${{ needs.build.result }}" "${{ needs.container-scan.result }}"; do
            if [[ "$job_result" != "success" && "$job_result" != "skipped" ]]; then
              echo "One or more CI jobs failed or were cancelled."
              echo "  konflux-verify:  ${{ needs.konflux-verify.result }}"
              echo "  lock-file-check: ${{ needs.lock-file-check.result }}"
              echo "  lint:            ${{ needs.lint.result }}"
              echo "  test:            ${{ needs.test.result }}"
              echo "  build:           ${{ needs.build.result }}"
              echo "  container-scan:  ${{ needs.container-scan.result }}"
              exit 1
            fi
          done
          echo "All CI jobs passed."
